  (function() {
    const data = JSON.parse(searchData);
    const input = document.getElementById("search-input");
    const results = document.getElementById("search-results");
    const meta = document.getElementById("search-meta");
    if (!input || !results) return;

    function tokenize(q) { return q.split(/\s+/).filter(Boolean); }

    function score(item, tokens) {
      let s = 0;
      const tl = item.title.toLowerCase();
      const dl = item.description.toLowerCase();
      for (const t of tokens) {
        if (tl.includes(t)) s += 10;         // title match: high weight
        else if (tl.includes(t.toLowerCase())) s += 10;
        if (dl.includes(t)) s += 3;           // description match: medium weight
        if (item.tags.some(tag => tag.toLowerCase().includes(t))) s += 5; // tag match
        // Bonus for exact match
        if (tl === t || item.tags.some(tag => tag.toLowerCase() === t)) s += 15;
      }
      return s;
    }

    function highlight(text, tokens) {
      if (!tokens.length) return text;
      const escaped = tokens.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
      const re = new RegExp(`(${escaped.join('|')})`, 'gi');
      return text.replace(re, '<mark class="bg-accent/20 text-accent rounded-sm px-0.5">$1</mark>');
    }

    let timer;
    input.addEventListener("input", () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        const q = input.value.trim();
        if (!q) {
          results.innerHTML = '<p class="text-muted-foreground text-sm">输入关键词开始搜索</p>';
          meta.textContent = '';
          return;
        }
        const tokens = tokenize(q.toLowerCase());
        const scored = data
          .map(item => ({ item, score: score(item, tokens) }))
          .filter(r => r.score > 0)
          .sort((a, b) => b.score - a.score || b.item.date.localeCompare(a.item.date));

        meta.textContent = scored.length ? `找到 ${scored.length} 条结果` : '未找到匹配结果';

        if (!scored.length) {
          results.innerHTML = '<p class="text-muted-foreground text-sm">未找到匹配结果，尝试其他关键词</p>';
          return;
        }
        results.innerHTML = scored.map(({ item, score }) => {
          const tagStr = item.tags.slice(0, 4).map(t => '<span class="bg-muted text-muted-foreground rounded-full px-1.5 py-0.5 text-[10px]">' + t + '</span>').join('');
          return '<a href="' + item.url + '" class="border-border hover:border-accent block rounded-lg border p-4 transition-colors">' +
            '<div class="flex items-center gap-2">' +
            '<span class="bg-muted text-muted-foreground shrink-0 rounded px-1.5 py-0.5 text-xs font-mono">' + item.type + '</span>' +
            '<span class="text-accent font-medium text-sm">' + highlight(item.title, tokens) + '</span>' +
            '</div>' +
            '<div class="text-muted-foreground mt-1.5 text-xs">' + item.date +
            (item.description ? ' — ' + highlight(item.description, tokens).slice(0, 120) : '') + '</div>' +
            (item.tags.length ? '<div class="mt-2 flex flex-wrap gap-1">' + tagStr + '</div>' : '') +
            '</a>';
        }).join("");
      }, 200); // 200ms debounce
    });
  })();
